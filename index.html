<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="vendor/bootstrap.min.css" />
  <link rel="stylesheet" href="vendor/atom-one-dark.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script><!-- https://stackoverflow.com/questions/21147149/flash-of-unstyled-content-fouc-in-firefox-only-is-ff-slow-renderer --></script>
</head>
<body>
  <div class="container mt-3">
    <div class="input-group mb-3">
      <input id="repo-url" type="text" class="form-control w-auto" />
      <span class="input-group-text">@</span>
      <input id="ref" type="text" class="form-control" placeholder="HEAD" list="refs-datalist" />
    </div>
    <div class="card mb-3">
      <div id="commit-header" class="card-header d-md-flex align-items-center border-bottom-0">
        <b class="me-2" id="latest-author">Loading...</b>
        <span id="latest-message"></span>
        <a id="expand-btn" class="ms-1 d-none" href="#" onclick="event.preventDefault();window.fullmsg=!window.fullmsg;window.onhashchange();">...</a>
        <div class="ms-auto">
          <button id="next-btn" class="btn btn-outline-light btn-sm font-monospace d-none" title="Subsequent commit">&lt;</button>
          <code id="commit-hash" class="text-truncate"></code>
          <button id="prev-btn" class="btn btn-outline-light btn-sm font-monospace d-none" title="Previous commit">&gt;</button>
          <button id="diff-btn" class="btn btn-outline-light btn-sm d-none">Diff</button>
          <button id="dl-btn" class="btn btn-outline-success btn-sm">Download ZIP</button>
        </div>
      </div>
      <pre id="full-message" class="m-3 d-none"></pre>
    </div>
    <div id="file-view" class="row g-3">
      <div class="col-md-3">
        <div class="card mb-3 overflow-hidden">
          <table class="table table-hover table-borderless mb-0">
            <tbody id="filelist"></tbody>
          </table>
        </div>
      </div>
      <div class="col-md-9">
        <div id="file-card" class="card mb-3 d-none">
          <div class="card-header d-flex">
            <span id="file-name"></span>
            <span id="raw-span" class="ms-1 d-none">(<a href="#" onclick="event.preventDefault();window.mdraw=!window.mdraw;window.onhashchange();">Raw</a>)</span>
            <code id="file-hash" class="ms-auto text-truncate"></code>
          </div>
          <pre id="file-data" class="m-3" style="text-wrap:initial"></pre>
          <div id="file-contents" class="m-3 d-none"></div>
        </div>
      </div>
    </div>
    <div id="diff-view" class="d-none"></div>
    <p id="status-text"></p>
  </div>
  <datalist id="refs-datalist"></datalist>
  <script src="git-parsers.js"></script>
  <script src="zip-slop.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="vendor/marked.js"></script>
  <script src="vendor/marked-alert.js"></script>
  <script src="vendor/marked-highlight.js"></script>
  <script src="vendor/diff.js"></script>
  <script src="script.js"></script>
</body>
</html>
